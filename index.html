<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <div class="navbar">
        <div class="nav-top">
          <div class="nav-logo border">
            <div class="logo"></div>
          </div>
          <div class="nav-location border">
            <div class="nav-loc-box1">
              <i class="fa-solid fa-location-dot"></i>
            </div>
            <div class="nav-loc-box2">
              <span class="nav-line1">Deliver to</span>
              <span class="nav-line2">Pakistan</span>
            </div>
          </div>
          <div class="nav-search">
            <select name="search-type" class="nav-search-select">
              <option value="all">All</option>
            </select>
            <input
              type="text"
              class="nav-search-input"
              placeholder="Search Amazon"
            />
            <div class="nav-search-button">
              <i class="fa-solid fa-magnifying-glass"></i>
            </div>
          </div>
          <div class="nav-signin border">
            <span class="nav-line1">Hello, sign in</span>
            <span class="nav-line2">Account & Lists</span>
          </div>
          <div class="nav-return border">
            <span class="nav-line1">Returns</span>
            <span class="nav-line2">& Orders</span>
          </div>
          <div class="nav-cart border">
            <div class="nav-cart-pair">
              <i class="fa-solid fa-cart-shopping"></i>
              <span class="nav-line2">Cart</span>
            </div>
          </div>
        </div>
        <div class="nav-main">
          <div class="nav-menu border">
            <i class="fa-solid fa-bars"></i>
            <span class="nav-line2">All</span>
          </div>
          <div class="nav-options">
            <ul class="nav-options-box">
              <li class="border"><a href="#">Gift Cards</a></li>
              <li class="border"><a href="#">Registry</a></li>
              <li class="border"><a href="#">Sell</a></li>
              <li class="border"><a href="#">Prime Video</a></li>
              <li class="border"><a href="#">Customer Service</a></li>
            </ul>
          </div>
          <div class="nav-deals border">
            <span class="nav-line2">Shop deals in Electronics</span>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
